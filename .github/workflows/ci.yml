name: Continuous Integration

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

permissions:
  contents: read
  issues: write

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          if ! pnpm install --frozen-lockfile --dry-run > /dev/null 2>&1; then
            echo "pnpm lock file out of sync, regenerating..."
            pnpm install
          else
            pnpm install --frozen-lockfile
          fi

      - name: Version consistency check
        run: pnpm run ci:version-check

      - name: Lint (critical files)
        run: pnpm run lint:critical

      - name: Lint (full src - non-blocking)
        run: pnpm run lint:src
        continue-on-error: true

      - name: TypeScript compilation check
        run: pnpm run typecheck

      - name: Build project
        run: pnpm run build

      - name: Run unit tests
        run: pnpm run test:unit

      - name: Run integration tests
        run: pnpm run test:integration

      - name: Enforce coverage thresholds
        run: pnpm run coverage:check

      - name: Run coverage (generate reports)
        if: always()
        run: pnpm run coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: |
            coverage/
            coverage/lcov.info
          retention-days: 7

      - name: Append coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            BRANCH=$(jq '.total.branches.pct' coverage/coverage-summary.json || echo 0)
            LINES=$(jq '.total.lines.pct' coverage/coverage-summary.json || echo 0)
            FUNCS=$(jq '.total.functions.pct' coverage/coverage-summary.json || echo 0)
            STMTS=$(jq '.total.statements.pct' coverage/coverage-summary.json || echo 0)
            echo "## Coverage Summary (Node ${{ matrix.node-version }})" >> $GITHUB_STEP_SUMMARY
            echo "- Lines: ${LINES}%" >> $GITHUB_STEP_SUMMARY
            echo "- Statements: ${STMTS}%" >> $GITHUB_STEP_SUMMARY
            echo "- Functions: ${FUNCS}%" >> $GITHUB_STEP_SUMMARY
            echo "- Branches: ${BRANCH}%" >> $GITHUB_STEP_SUMMARY
          else
            echo "No coverage summary JSON found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run performance tests
        run: pnpm run test:performance

      - name: Run performance regression gate
        env:
          PERF_BASELINE_FILE: ${{ vars.PERF_BASELINE_FILE }}
          PERF_CURRENT_FILE: ${{ vars.PERF_CURRENT_FILE }}
          PERF_COMMIT_SHA: ${{ github.sha }}
          PERF_RUNTIME_MODE: node-${{ matrix.node-version }}
        run: pnpm run ci:perf-gate

      - name: Install MCP Inspector
        run: pnpm add -g @modelcontextprotocol/inspector

      - name: Run MCP protocol validation
        run: pnpm run test:mcp

      - name: Run runtime parity smoke tests
        run: pnpm run test:infra:parity

  hardening-release-gates:
    name: Hardening Release Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          if ! pnpm install --frozen-lockfile --dry-run > /dev/null 2>&1; then
            pnpm install
          else
            pnpm install --frozen-lockfile
          fi

      - name: Build project
        run: pnpm run build

      - name: Resolve gate policy
        id: gate_policy
        run: |
          strict=false
          policy=warn
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == "refs/heads/master" || "${GITHUB_REF}" == refs/heads/release/* || "${GITHUB_REF}" == refs/tags/v* ]]; then
              strict=true
              policy=fail
            fi
          fi
          echo "strict_mode=${strict}" >> "$GITHUB_OUTPUT"
          echo "policy_mode=${policy}" >> "$GITHUB_OUTPUT"

      - name: Run load/soak release checklist gates
        env:
          PERF_GATE_POLICY_MODE: ${{ steps.gate_policy.outputs.policy_mode }}
          PERF_GATE_REQUIRE_FILES: ${{ steps.gate_policy.outputs.strict_mode }}
        run: |
          mkdir -p performance-data
          pnpm start > performance-data/local-gate-server.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3001/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:3001/health >/dev/null

          pnpm run ci:load-profile-suite -- --light --base-url http://127.0.0.1:3001 --output performance-data/load-profile-baseline.json
          pnpm run ci:load-profile-suite -- --light --base-url http://127.0.0.1:3001 --output performance-data/load-profile-current.json
          pnpm run ci:perf-gate -- performance-data/load-profile-baseline.json performance-data/load-profile-current.json

          if [[ "${{ steps.gate_policy.outputs.strict_mode }}" == "true" ]]; then
            pnpm run ci:hardening:soak-leak-checks -- --light --base-url http://127.0.0.1:3001 --output performance-data/hardening-soak-leak.json
          else
            pnpm run ci:hardening:soak-leak-checks -- --light --warn-only --base-url http://127.0.0.1:3001 --output performance-data/hardening-soak-leak.json
          fi

      - name: Upload hardening gate artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: hardening-release-gates
          path: |
            performance-data/load-profile-baseline.json
            performance-data/load-profile-current.json
            performance-data/hardening-soak-leak.json
            performance-data/local-gate-server.log
          retention-days: 7

  mcp-compliance:
    name: MCP Protocol Compliance
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          if ! pnpm install --frozen-lockfile --dry-run > /dev/null 2>&1; then
            pnpm install
          else
            pnpm install --frozen-lockfile
          fi

      - name: Build project
        run: pnpm run build

      - name: Install MCP Inspector
        run: pnpm add -g @modelcontextprotocol/inspector

      - name: Comprehensive MCP validation
        env:
          REMOTE_SERVER_URL: ${{ secrets.REMOTE_SERVER_URL }}
        run: |
          echo "Running comprehensive MCP protocol validation..."
          pnpm run test:mcp
          if [ -n "$REMOTE_SERVER_URL" ]; then
            eval "$(node scripts/resolve-remote-endpoints.js "$REMOTE_SERVER_URL")"
            SERVER_URL="$REMOTE_MCP_URL" pnpm run test:mcp
          fi

      - name: Generate MCP compliance report
        run: |
          echo "# MCP Protocol Compliance Report" > mcp-compliance-report.md
          echo "" >> mcp-compliance-report.md
          echo "Generated on: $(date)" >> mcp-compliance-report.md
          echo "" >> mcp-compliance-report.md
          echo "## Test Results" >> mcp-compliance-report.md
          if [ -f test-output/mcp-validation.log ]; then
            echo "\`\`\`" >> mcp-compliance-report.md
            cat test-output/mcp-validation.log >> mcp-compliance-report.md
            echo "\`\`\`" >> mcp-compliance-report.md
          fi

      - name: Upload compliance report
        uses: actions/upload-artifact@v6
        with:
          name: mcp-compliance-report
          path: mcp-compliance-report.md

  remote-server-test:
    name: Remote Server Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, mcp-compliance]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          if ! pnpm install --frozen-lockfile --dry-run > /dev/null 2>&1; then
            pnpm install
          else
            pnpm install --frozen-lockfile
          fi

      - name: Test remote Cloudflare Workers deployment
        env:
          REMOTE_SERVER_URL: ${{ secrets.REMOTE_SERVER_URL }}
        run: |
          echo "Testing remote server deployment..."
          eval "$(node scripts/resolve-remote-endpoints.js "$REMOTE_SERVER_URL")"
          curl -f "$REMOTE_HEALTH_URL" || echo "Remote server not accessible"
          SERVER_URL="$REMOTE_MCP_URL" pnpm run test:mcp

      - name: Performance benchmark against remote
        env:
          REMOTE_SERVER_URL: ${{ secrets.REMOTE_SERVER_URL }}
        run: |
          echo "Running performance benchmarks..."
          eval "$(node scripts/resolve-remote-endpoints.js "$REMOTE_SERVER_URL")"
          SERVER_URL="$REMOTE_MCP_URL" pnpm run test:performance

  security-check:
    name: Security & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          if ! pnpm install --frozen-lockfile --dry-run > /dev/null 2>&1; then
            pnpm install
          else
            pnpm install --frozen-lockfile
          fi

      - name: Run security audit
        run: pnpm audit --audit-level=moderate || echo "pnpm audit returned issues"

      - name: Check for sensitive data in logs
        run: |
          pnpm run build
          timeout 10s pnpm start 2>&1 | grep -i "api.key\|token\|secret\|password" && exit 1 || echo "No sensitive data found in logs"

      - name: Validate MCP server security
        run: |
          pnpm run build
          echo '{"invalid": "json"' | timeout 5s pnpm start || echo "Server handles malformed input gracefully"

  required-checks-gate:
    name: Required Checks Gate
    runs-on: ubuntu-latest
    needs: [test, hardening-release-gates, mcp-compliance, security-check]
    if: always()
    steps:
      - name: Summarize upstream job results
        run: |
          echo "Test Suite result: ${{ needs.test.result }}"
          echo "Hardening Release Gates result: ${{ needs['hardening-release-gates'].result }}"
          echo "MCP Compliance result: ${{ needs['mcp-compliance'].result }}"
          echo "Security & Code Quality result: ${{ needs['security-check'].result }}"
      - name: Fail if any required check failed
        if: ${{ needs.test.result != 'success' || needs['hardening-release-gates'].result != 'success' || needs['mcp-compliance'].result != 'success' || needs['security-check'].result != 'success' }}
        run: |
          echo "One or more required checks failed" >&2
          exit 1
      - name: All required checks passed
        if: ${{ needs.test.result == 'success' && needs['hardening-release-gates'].result == 'success' && needs['mcp-compliance'].result == 'success' && needs['security-check'].result == 'success' }}
        run: echo "All required checks passed"
